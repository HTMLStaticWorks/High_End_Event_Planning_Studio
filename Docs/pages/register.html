<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Portal Access — Solenza Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/dark-mode.css">
    <link rel="stylesheet" href="../assets/css/rtl.css">
    <link rel="icon" type="image/svg+xml" href="../assets/images/favicon.svg">
</head>
<body style="background-color: var(--color-bg); display: flex; min-height: 100vh; align-items: center; justify-content: center; margin: 0; padding: var(--space-4);">

    <div class="auth-card fade-up" style="position: relative; background: var(--color-bg-alt); padding: var(--space-6); border: 1px solid var(--color-border); width: 100%; max-width: 500px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05);">
        
        <button class="action-btn js-theme-toggle" aria-label="Toggle Dark Mode" style="position: absolute; top: var(--space-4); right: var(--space-4); background: transparent; border: none; cursor: pointer; font-size: 1.25rem; color: var(--color-text-light); transition: transform 0.3s ease;" onmouseover="this.style.transform='rotate(15deg)'" onmouseout="this.style.transform='rotate(0deg)'">☾</button>

        <a href="../index.html" class="site-logo" style="display: block; margin-bottom: var(--space-4); font-size: 2.5rem; text-decoration: none; color: var(--color-text);">Solenza</a>
        
        <h2 class="mb-4" style="font-size: 1.5rem; font-weight: 400;">Create Profile</h2>
        
        <form id="registerForm" novalidate style="text-align: left;">
            <div class="form-group" style="margin-bottom: var(--space-3);">
                <label class="form-label" style="font-size: 0.75rem; color: var(--color-text-light);">First Name *</label>
                <input type="text" class="form-control" required style="width: 100%; padding: 0.75rem; border: 1px solid var(--color-border); font-family: var(--font-body);">
                <div class="error-msg" style="color: #d9534f; font-size: 0.75rem; display: none; margin-top: 4px;">Required.</div>
            </div>
            <div class="form-group" style="margin-bottom: var(--space-3);">
                <label class="form-label" style="font-size: 0.75rem; color: var(--color-text-light);">Last Name *</label>
                <input type="text" class="form-control" required style="width: 100%; padding: 0.75rem; border: 1px solid var(--color-border); font-family: var(--font-body);">
                <div class="error-msg" style="color: #d9534f; font-size: 0.75rem; display: none; margin-top: 4px;">Required.</div>
            </div>
            
            <div class="form-group" style="margin-bottom: var(--space-3);">
                <label class="form-label" style="font-size: 0.75rem; color: var(--color-text-light);">Email Address *</label>
                <input type="email" class="form-control" placeholder="you@example.com" required style="width: 100%; padding: 0.75rem; border: 1px solid var(--color-border); font-family: var(--font-body);">
                <div class="error-msg" style="color: #d9534f; font-size: 0.75rem; display: none; margin-top: 4px;">Valid email required.</div>
            </div>
            
            <div class="form-group" style="margin-bottom: var(--space-3);">
                <label class="form-label" style="font-size: 0.75rem; color: var(--color-text-light);">Create Password *</label>
                <input type="password" class="form-control" placeholder="••••••••" required style="width: 100%; padding: 0.75rem; border: 1px solid var(--color-border); font-family: var(--font-body);">
                <div class="error-msg" style="color: #d9534f; font-size: 0.75rem; display: none; margin-top: 4px;">Password required.</div>
            </div>
            
            <button type="submit" class="btn btn--primary" style="width: 100%; padding: 1rem; margin-top: var(--space-2);">Submit Request</button>
            
            <div style="display: flex; align-items: center; margin: var(--space-4) 0; gap: 10px;">
                <hr style="flex: 1; border: none; border-top: 1px solid var(--color-border);">
                <span style="font-size: 0.75rem; color: var(--color-text-light); text-transform: uppercase; letter-spacing: 0.05em;">or continue with</span>
                <hr style="flex: 1; border: none; border-top: 1px solid var(--color-border);">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-2);">
                <button type="button" class="btn-social">
                    <img src="https://www.gstatic.com/images/branding/product/1x/googleg_48dp.png" alt="Google"> Google
                </button>
                <button type="button" class="btn-social">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C3.23 15.35 4.3 8.35 8.13 8.16c.99-.05 1.7.53 2.3.53s1.53-.61 2.76-.52c1.23.09 2.2.55 2.87 1.44-2.58 1.5-2.16 4.76.41 5.81-.54 1.34-1.22 2.68-2.42 4.86zM13.43 3.51c.06 1.75-1.43 3.32-3.13 3.4-1.93.08-3.52-1.39-3.41-3.21.11-1.72 1.58-3.26 3.29-3.32 2.05-.07 3.25 1.38 3.25 3.13z"/></svg> Apple
                </button>
            </div>
            
            <div class="mt-4 text-center" style="margin-top: var(--space-4);">
                <p style="font-size: clamp(0.75rem, 3vw, 0.875rem); white-space: nowrap;">Already have an account? <a href="login.html" style="color: var(--color-champagne-dark); text-decoration: underline; text-underline-offset: 4px;">Sign in here</a></p>
            </div>
        </form>
    </div>

    <script src="../assets/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('registerForm');
            if(form) {
                form.addEventListener('submit', function(e) {
                    e.preventDefault();
                    let isValid = true;
                    
                    const inputs = form.querySelectorAll('[required]');
                    inputs.forEach(input => {
                        if (!input.value.trim() || (input.type === 'email' && !/^[\w-\.]+@([\w-]+\.)+[\w-]{2,4}$/.test(input.value))) {
                            isValid = false;
                            input.style.borderColor = '#d9534f';
                            input.nextElementSibling.style.display = 'block';
                        } else {
                            input.style.borderColor = 'var(--color-border)';
                            input.nextElementSibling.style.display = 'none';
                        }
                    });

                    if (isValid) {
                        window.location.href = 'dashboard.html';
                    }
                });
            }
        });
    </script>
    <button class="back-to-top" id="backToTop" aria-label="Back to Top">↑</button>
</body>
</html>
