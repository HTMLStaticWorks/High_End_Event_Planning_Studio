<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Portal Login — Lumière Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/dark-mode.css">
    <link rel="stylesheet" href="../assets/css/rtl.css">
    <link rel="icon" type="image/svg+xml" href="../assets/images/favicon.svg">
</head>
<body style="background-color: var(--color-bg); display: flex; min-height: 100vh; align-items: center; justify-content: center; margin: 0; padding: var(--space-4);">

    <div class="auth-card fade-up" style="background: var(--color-bg-alt); padding: var(--space-6); border: 1px solid var(--color-border); width: 100%; max-width: 450px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05);">
        
        <a href="index.html" class="site-logo" style="display: block; margin-bottom: var(--space-4); font-size: 2.5rem; text-decoration: none; color: var(--color-text);">Lumière</a>
        
        <h2 class="mb-4" style="font-size: 1.5rem; font-weight: 400;">Welcome Back</h2>
        
        <form id="loginForm" novalidate style="text-align: left;">
            <div class="form-group" style="margin-bottom: var(--space-3);">
                <label class="form-label" for="loginEmail" style="font-size: 0.75rem; color: var(--color-text-light);">Email Address</label>
                <input type="email" id="loginEmail" class="form-control" placeholder="you@example.com" required style="width: 100%; padding: 0.75rem; border: 1px solid var(--color-border); font-family: var(--font-body);">
                <div class="error-msg" style="color: #d9534f; font-size: 0.75rem; display: none; margin-top: 4px;">Please enter your email.</div>
            </div>
            
            <div class="form-group" style="margin-bottom: var(--space-3);">
                <label class="form-label" for="loginPassword" style="font-size: 0.75rem; color: var(--color-text-light);">Password</label>
                <input type="password" id="loginPassword" class="form-control" placeholder="••••••••" required style="width: 100%; padding: 0.75rem; border: 1px solid var(--color-border); font-family: var(--font-body);">
                <div class="error-msg" style="color: #d9534f; font-size: 0.75rem; display: none; margin-top: 4px;">Please enter your password.</div>
            </div>
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-4); flex-wrap: nowrap; gap: 8px;">
                <label style="font-size: clamp(0.7rem, 2.5vw, 0.875rem); cursor: pointer; display: flex; align-items: center; gap: 4px; white-space: nowrap; flex-shrink: 0;">
                    <input type="checkbox"> Remember me
                </label>
                <a href="#" style="font-size: clamp(0.7rem, 2.5vw, 0.875rem); color: var(--color-champagne-dark); text-decoration: underline; text-underline-offset: 4px; white-space: nowrap; flex-shrink: 1; text-align: right;">Forgot Password?</a>
            </div>
            
            <button type="submit" class="btn btn--primary" style="width: 100%; padding: 1rem;">Sign In</button>
            
            <div class="mt-4 text-center" style="margin-top: var(--space-4);">
                <p style="font-size: clamp(0.75rem, 3vw, 0.875rem); white-space: nowrap;">Don't have an account? <a href="register.html" style="color: var(--color-champagne-dark); text-decoration: underline; text-underline-offset: 4px;">Request Access</a></p>
            </div>
        </form>
    </div>

    <script src="../assets/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('loginForm');
            if(form) {
                form.addEventListener('submit', function(e) {
                    e.preventDefault();
                    let isValid = true;
                    const email = document.getElementById('loginEmail');
                    const pass = document.getElementById('loginPassword');
                    
                    if (!email.value.trim() || !/^[\w-\.]+@([\w-]+\.)+[\w-]{2,4}$/.test(email.value)) {
                        isValid = false;
                        email.style.borderColor = '#d9534f';
                        email.nextElementSibling.style.display = 'block';
                    } else {
                        email.style.borderColor = 'var(--color-border)';
                        email.nextElementSibling.style.display = 'none';
                    }

                    if (!pass.value.trim()) {
                        isValid = false;
                        pass.style.borderColor = '#d9534f';
                        pass.nextElementSibling.style.display = 'block';
                    } else {
                        pass.style.borderColor = 'var(--color-border)';
                        pass.nextElementSibling.style.display = 'none';
                    }

                    if (isValid) {
                        window.location.href = 'dashboard.html';
                    }
                });
            }
        });
    </script>
</body>
</html>
